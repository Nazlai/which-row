name: deploy

on:
  push:
    branches: [main]

env:
  AWS_REGION: ap-northeast-1

permissions:
  id-token: write
  contents: read

jobs:
  deploy-to-aws:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo
        uses: actions/checkout@v6

      - name: build
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - run: npm ci
      - run: npm run build
        working-directory: ./source

      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: arn:aws:iam::064137888589:role/seating-static-site-deploy
          role-session-name: github-to-aws
          aws-region: ${{ env.AWS_REGION }}

      - name: install cdk
        run: npm i -g aws-cdk

      - name: deploy via cdk
        working-directory: ./deployment
        run: cdk deploy

  slack-notification:
    environment: prod
    needs: deploy-to-aws
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: slack notify
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_COLOR: ${{ job.status }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
